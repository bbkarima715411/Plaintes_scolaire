{% extends 'base.html' %}

{% block content %}
<div class="card shadow-sm">
    <div class="card-body">
        <h1>Supprimer la plainte</h1>
        <p>Voulez-vous vraiment supprimer la plainte <strong>{{ plainte.numero_dossier }}</strong> ?</p>
        <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Oui, supprimer</button>
            <a href="{% url 'plainte_detail' plainte.pk %}" class="btn btn-secondary">Annuler</a>
        </form>
    </div>
</div>
{% endblock %}
