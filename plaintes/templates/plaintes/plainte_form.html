{% extends 'base.html' %}
{% load static %}

{% block content %}
<h1 class="mb-4">{{ titre }}</h1>

<link rel="stylesheet" href="{% static 'plaintes/css/plainte_form.css' %}">

<form method="post" class="card card-body shadow-sm">
    {% csrf_token %}
    <div class="row g-4">
        {% for field in form %}
            <div class="{% if field.name == 'motif_plainte' or field.name == 'remarque' %}col-12{% else %}col-md-6{% endif %}">
                <div class="plainte-form-field">
                    <label class="form-label fw-semibold" for="{{ field.id_for_label }}">{{ field.label }}</label>
                    {{ field }}
                    {% if field.errors %}
                        <div class="text-danger small mt-1">{{ field.errors }}</div>
                    {% endif %}
                </div>
            </div>
        {% endfor %}
    </div>

    <div class="d-flex gap-2 mt-4">
        <button type="submit" class="btn btn-primary">Enregistrer</button>
        <a href="{% url 'plainte_list' %}" class="btn btn-secondary">Annuler</a>
    </div>
</form>

<script src="{% static 'plaintes/js/plainte_form.js' %}"></script>
{% endblock %}
