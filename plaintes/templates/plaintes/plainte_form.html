{% extends 'base.html' %}

{% block content %}
<h1 class="mb-4">{{ titre }}</h1>

<style>
    .plainte-form-field input,
    .plainte-form-field select,
    .plainte-form-field textarea {
        display: block;
        width: 100%;
        background-color: #ffffff;
        transition: background-color 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .plainte-form-field input.field-filled,
    .plainte-form-field select.field-filled,
    .plainte-form-field textarea.field-filled {
        background-color: #eef2f7;
        border-color: #6c8ebf;
    }

    .plainte-form-field input:focus,
    .plainte-form-field select:focus,
    .plainte-form-field textarea:focus {
        box-shadow: 0 0 0 0.2rem rgba(13, 110, 253, 0.15);
    }
</style>

<form method="post" class="card card-body shadow-sm">
    {% csrf_token %}
    <div class="row g-4">
        {% for field in form %}
            <div class="{% if field.name == 'motif_plainte' or field.name == 'remarque' %}col-12{% elif field.name == 'retour_wf_signe' %}col-12{% else %}col-md-6{% endif %}">
                <div class="plainte-form-field">
                    {% if field.name == 'retour_wf_signe' %}
                        <div class="form-check mt-4">
                            {{ field }}
                            <label class="form-check-label" for="{{ field.id_for_label }}">{{ field.label }}</label>
                        </div>
                    {% else %}
                        <label class="form-label fw-semibold" for="{{ field.id_for_label }}">{{ field.label }}</label>
                        {{ field }}
                    {% endif %}
                    {% if field.errors %}
                        <div class="text-danger small mt-1">{{ field.errors }}</div>
                    {% endif %}
                </div>
            </div>
        {% endfor %}
    </div>

    <div class="d-flex gap-2 mt-4">
        <button type="submit" class="btn btn-primary">Enregistrer</button>
        <a href="{% url 'plainte_list' %}" class="btn btn-secondary">Annuler</a>
    </div>
</form>

<script>
    function updateFilledState(field) {
        if (field.type === 'checkbox') {
            if (field.checked) {
                field.classList.add('field-filled');
            } else {
                field.classList.remove('field-filled');
            }
            return;
        }

        if (field.value.trim() !== '') {
            field.classList.add('field-filled');
        } else {
            field.classList.remove('field-filled');
        }
    }

    document.querySelectorAll('.plainte-form-field input, .plainte-form-field select, .plainte-form-field textarea').forEach(function(field) {
        updateFilledState(field);
        field.addEventListener('input', function() {
            updateFilledState(field);
        });
        field.addEventListener('change', function() {
            updateFilledState(field);
        });
    });
</script>
{% endblock %}
