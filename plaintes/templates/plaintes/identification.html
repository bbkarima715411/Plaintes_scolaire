{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-7 col-lg-5">
        <div class="card shadow-sm border-0">
            <div class="card-body p-4">
                <h1 class="h3 mb-3 text-center">Identification utilisateur</h1>
                <p class="text-muted text-center mb-4">
                    Indiquez votre nom pour commencer la session de travail.
                    Ce nom sera repris automatiquement dans les dossiers traités.
                </p>

                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="nom_utilisateur" class="form-label fw-semibold">Nom de l’utilisateur</label>
                        <input
                            type="text"
                            id="nom_utilisateur"
                            name="nom_utilisateur"
                            class="form-control form-control-lg"
                            placeholder="Exemple : Agent Dupuis"
                            required
                            autofocus
                        >
                    </div>
                    <button type="submit" class="btn btn-primary btn-lg w-100">Commencer</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
